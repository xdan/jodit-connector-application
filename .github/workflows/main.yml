name: CI

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
  workflow_dispatch:

jobs:
  # `newversion` pushes the branch and the release tag together, which fires two
  # runs for the same commit. Skip the branch run when the commit is tagged and
  # let the tag run own CI (branch pushes without a tag still run normally).
  guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: check
        run: |
          if [ "${{ github.ref_type }}" = "branch" ] && [ -n "$(git tag --points-at HEAD)" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  # Run the Codeception suite against the built-in PHP server across the
  # supported PHP versions (deps require php >= 8.2).
  api-tests:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    name: API tests (PHP ${{ matrix.php }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, exif, mbstring, curl, json, zip
          ini-values: register_argc_argv=On, display_errors=Off
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: composer test

  # Only after the tests pass, and only on a release tag, tell the dependent
  # connector to rebuild/redeploy (the previous behaviour of this workflow).
  trigger:
    needs: api-tests
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger jodit-connectors new version
        run: |
          curl -XPOST \
            -u "${{ secrets.PAT_USERNAME }}:${{ secrets.PAT_TOKEN }}" \
            -H "Accept:application/vnd.github.everest-preview+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/xdan/jodit-connectors/dispatches \
            --data '{"event_type": "newversion"}'
