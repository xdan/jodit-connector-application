name: CI

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
  workflow_dispatch:

jobs:
  # Run the Codeception API suite against the built-in PHP server on a range of
  # supported PHP versions (composer.json requires php >= 8).
  api-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    name: API tests (PHP ${{ matrix.php }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, exif, mbstring, curl, json, zip
          ini-values: register_argc_argv=On, display_errors=Off
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run API tests
        run: composer test

  # Only after the tests pass, and only on a release tag, tell the dependent
  # connector to rebuild/redeploy (the previous behaviour of this workflow).
  trigger:
    needs: api-tests
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger jodit-connectors new version
        run: |
          curl -XPOST \
            -u "${{ secrets.PAT_USERNAME }}:${{ secrets.PAT_TOKEN }}" \
            -H "Accept:application/vnd.github.everest-preview+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/xdan/jodit-connectors/dispatches \
            --data '{"event_type": "newversion"}'
